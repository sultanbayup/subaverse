# Hugo configuration file
title: Subaverse

enableInlineShortcodes: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Projects
      pageRef: /projects
      weight: 2
    - name: Blog
      pageRef: /blog
      weight: 3
    - name: About
      url: "/about"
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/sultanbayup"
      params:
        icon: github
    - name: Theme Toggle
      params:
        type: theme-toggle
        # label: true # optional, default is false

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  toc:
    displayTags: true

  blog:
    list:
      displayTags: true
      pagerSize: 6
