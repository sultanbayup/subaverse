<style>
/* ─── Hero layout ─────────────────────────────────────────── */
.hero-wrap {
  min-height: min(70vh, 500px);
  display: flex;
  align-items: center;
  padding: 3rem 0;
}
.hero-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  width: 100%;
}
.hero-image img {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #374151;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.hero-text {
  text-align: center;
  width: 100%;
}
.hero-buttons {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.hero-buttons a {
  border-radius: 0.5rem !important;
}
.hero-btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1.25rem;
  border-radius: 0.5rem;
  border: 1px solid rgba(0,0,0,0.2);
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s ease, background-color 0.2s ease;
}
.hero-btn-secondary:hover {
  background-color: rgba(0,0,0,0.04);
  border-color: rgba(0,0,0,0.35);
}
.dark .hero-btn-secondary {
  border-color: rgba(255,255,255,0.2);
}
.dark .hero-btn-secondary:hover {
  background-color: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.35);
}

/* Desktop: side by side, image on right */
@media (min-width: 768px) {
  .hero-inner {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 3rem;
  }
  .hero-image {
    order: 2;
    flex-shrink: 0;
  }
  .hero-image img {
    width: 300px;
    height: 300px;
  }
  .hero-text {
    order: 1;
    flex: 1;
    text-align: left;
  }
  .hero-buttons {
    justify-content: flex-start;
  }
}

/* ─── Section headers (unused utility, kept for future use) ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4rem;
  margin-bottom: 1.25rem;
}
.section-title {
  font-size: clamp(1.5rem, 3vw, 1.875rem);
  font-weight: 700;
  margin: 0;
  line-height: 1.2;
}
.section-link {
  font-size: 0.875rem;
  font-weight: 500;
  white-space: nowrap;
  text-decoration: none;
  flex-shrink: 0;
}
</style>
